<div class="shell" [class.shell--unauthenticated]="!authService.isLoggedIn()">
  @if (authService.isLoggedIn()) {
    <app-header-nav
      [userDisplayName]="userDisplayName()"
      [notificationCount]="unreadNotifications().length"
      [isDarkMode]="themeService.isDark()"
      (mobileMenuToggle)="toggleMobileNav()"
      (themeToggle)="themeService.toggle()"
    />

    <app-drawer
      [isOpen]="isMobileNavOpen()"
      ariaLabel="Navigation"
      position="left"
      (closed)="closeMobileNav()"
    >
      <app-sidebar
        (closed)="closeMobileNav()"
        [notificationCount]="unreadNotifications().length"
        [isDarkMode]="themeService.isDark()"
        (darkModeChange)="themeService.toggle()"
      />
    </app-drawer>
  }

  <div class="shell__main">
    @if (authService.isLoggedIn() && isNotificationBannerVisible()) {
      <div class="notif-banner" role="alert">
        <div class="notif-banner__content">
          <strong>{{ unreadNotifications().length }} Benachrichtigung(en)</strong>
          @for (n of unreadNotifications().slice(0, 5); track n.id) {
            <span class="notif-item">{{ n.titel }}</span>
          }
        </div>
        <button class="btn btn-sm" (click)="markAllNotificationsRead()">OK, verstanden</button>
      </div>
    }

    <main class="shell__content" id="main-content">
      <router-outlet />
    </main>
  </div>
</div>

<app-toast />
<app-onboarding />
