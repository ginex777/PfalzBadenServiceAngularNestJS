<div class="formular-content">
  @if (!istBearbeiten()) {
    <!-- Neu anlegen -->
    <div class="form-grid">
      <div class="form-field">
        <label for="src-app-features-benutzerverwaltung-components-benutzer-formular-benutzer-formular-component-0" class="form-hint">Vorname</label>
        <input id="src-app-features-benutzerverwaltung-components-benutzer-formular-benutzer-formular-component-0" class="form-input" type="text" placeholder="Max" [formField]="neuForm.vorname" />
      </div>
      <div class="form-field">
        <label for="src-app-features-benutzerverwaltung-components-benutzer-formular-benutzer-formular-component-1" class="form-hint">Nachname</label>
        <input id="src-app-features-benutzerverwaltung-components-benutzer-formular-benutzer-formular-component-1" class="form-input" type="text" placeholder="Mustermann" [formField]="neuForm.nachname" />
      </div>
      <div class="form-field">
        <label for="src-app-features-benutzerverwaltung-components-benutzer-formular-benutzer-formular-component-2" class="form-hint">E-Mail *</label>
        <input id="src-app-features-benutzerverwaltung-components-benutzer-formular-benutzer-formular-component-2" class="form-input" type="email" placeholder="nutzer@beispiel.de" [formField]="neuForm.email" />
        @if (neuForm.email().touched() && neuForm.email().invalid()) {
          <span class="form-fehler">{{ neuForm.email().errors()[0]?.message }}</span>
        }
      </div>
      <div class="form-field">
        <label for="src-app-features-benutzerverwaltung-components-benutzer-formular-benutzer-formular-component-3" class="form-hint">Passwort * (min. 8 Zeichen)</label>
        <input id="src-app-features-benutzerverwaltung-components-benutzer-formular-benutzer-formular-component-3" class="form-input" type="password" autocomplete="new-password" placeholder="••••••••" [formField]="neuForm.password" />
        @if (neuForm.password().touched() && neuForm.password().invalid()) {
          <span class="form-fehler">{{ neuForm.password().errors()[0]?.message }}</span>
        }
      </div>
      <div class="form-field">
        <label for="src-app-features-benutzerverwaltung-components-benutzer-formular-benutzer-formular-component-4" class="form-hint">Rolle</label>
        <select
          class="form-input"
          [value]="neuModell().rolle"
          (change)="neuRolleGeaendert($event)"
        >
          @for (opt of rollenOptionen; track opt.wert) {
            <option [value]="opt.wert">{{ opt.label }}</option>
          }
        </select>
      </div>
    </div>
  } @else {
    <!-- Bearbeiten -->
    <div class="form-grid">
      <div class="form-field">
        <label for="src-app-features-benutzerverwaltung-components-benutzer-formular-benutzer-formular-component-5" class="form-hint">Vorname</label>
        <input id="src-app-features-benutzerverwaltung-components-benutzer-formular-benutzer-formular-component-5" class="form-input" type="text" [formField]="bearbeitenForm.vorname" />
      </div>
      <div class="form-field">
        <label for="src-app-features-benutzerverwaltung-components-benutzer-formular-benutzer-formular-component-6" class="form-hint">Nachname</label>
        <input id="src-app-features-benutzerverwaltung-components-benutzer-formular-benutzer-formular-component-6" class="form-input" type="text" [formField]="bearbeitenForm.nachname" />
      </div>
      <div class="form-field">
        <label for="src-app-features-benutzerverwaltung-components-benutzer-formular-benutzer-formular-component-7" class="form-hint">Rolle</label>
        <select
          class="form-input"
          [value]="bearbeitenModell().rolle"
          (change)="bearbeitenRolleGeaendert($event)"
        >
          @for (opt of rollenOptionen; track opt.wert) {
            <option [value]="opt.wert">{{ opt.label }}</option>
          }
        </select>
      </div>
    </div>
  }

  <div class="form-aktionen">
    <button class="btn btn-sm" type="button" (click)="abbrechen()">Abbrechen</button>
    <button
      class="btn btn-sm btn-primary"
      [disabled]="isLoading() || (istBearbeiten() ? !bearbeitenGueltig() : !neuGueltig())"
      (click)="speichern()"
    >
      {{ isLoading() ? 'Speichern…' : (istBearbeiten() ? 'Speichern' : 'Benutzer anlegen') }}
    </button>
  </div>
</div>
