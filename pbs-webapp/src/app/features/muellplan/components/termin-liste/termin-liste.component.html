@if (!terms().length) {
  <app-empty-state
    title="Keine Termine vorhanden"
    description="Fügen Sie Abholtermine für dieses Objekt hinzu."
  />
} @else {
  <div class="termin-liste">
    @for (t of terms(); track t.id) {
      <div
        class="termin-zeile"
        [class.erledigt]="t.erledigt"
        [class.ueberfaellig]="istUeberfaellig(t)"
      >
        <input
          type="checkbox"
          [checked]="t.erledigt"
          (change)="toggleDone.emit(t)"
          class="termin-check"
        />
        <span class="muell-badge" [style.background]="t.farbe">{{ t.muellart }}</span>
        <span class="termin-datum">{{ datumFormatieren(t.abholung) }}</span>
        @if (istUeberfaellig(t)) {
          <span class="ueberfaellig-badge">Überfällig</span>
        }
        <div class="termin-aktionen">
          <button class="btn-action" title="edit" (click)="edit.emit(t)">
            edit
          </button>
          <button
            class="btn-action btn-action--danger"
            title="Löschen"
            (click)="delete.emit(t.id)"
          >
            Löschen
          </button>
        </div>
      </div>
    }
  </div>
}
