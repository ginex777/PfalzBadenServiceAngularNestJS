@if (!objekte().length) {
  <app-empty-state
    titel="Keine Objekte vorhanden"
    beschreibung="Legen Sie Ihr erstes Betreuungsobjekt an."
    aktionLabel="+ Erstes Objekt anlegen"
    (aktion)="neuAnlegen.emit()"
  />
} @else {
  <div class="objekt-grid">
    @for (obj of objekte(); track obj.id) {
      <div class="objekt-karte" [class.aktiv]="aktuellesObjekt()?.id === obj.id" (click)="auswaehlen.emit(obj)">
        <div class="objekt-name">{{ obj.name }}</div>
        @if (obj.strasse || obj.ort) {
          <div class="objekt-adresse">
            {{ adresseFormatieren(obj) }}
          </div>
        }
        <div class="objekt-aktionen" (click)="$event.stopPropagation()">
          <button class="btn-action" title="Bearbeiten" (click)="bearbeiten.emit(obj)">Bearbeiten</button>
          <button class="btn-action btn-action--danger" title="Löschen" (click)="loeschen.emit(obj.id)">Löschen</button>
        </div>
      </div>
    }
  </div>
}
