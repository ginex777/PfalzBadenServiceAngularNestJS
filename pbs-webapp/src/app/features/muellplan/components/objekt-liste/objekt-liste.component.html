@if (!objects().length) {
  <app-empty-state
    titel="Keine Objekte vorhanden"
    beschreibung="Legen Sie ein Objekt in der Verwaltung an, damit es hier auswählbar ist."
  />
} @else {
  <div class="objekt-grid">
    @for (obj of objects(); track obj.id) {
      <div
        class="objekt-karte"
        [class.aktiv]="currentObject()?.id === obj.id"
        (click)="select.emit(obj)"
      >
        <div class="objekt-name">{{ obj.name }}</div>
        @if (obj.strasse || obj.ort) {
          <div class="objekt-adresse">
            {{ adresseFormatieren(obj) }}
          </div>
        }
      </div>
    }
  </div>
}
