@if (bezahltKandidat()) {
  <app-modal
    [isOpen]="!!bezahltKandidat()"
    title="Rechnung als bezahlt markieren"
    size="sm"
    (closed)="alsGezahltAbbrechen.emit()"
  >
    <p>
      Rechnung <strong>{{ bezahltKandidat()!.nr }}</strong> — {{ bezahltKandidat()!.empf }}
    </p>
    <p>
      Betrag: <strong>{{ waehrungFormatieren(bezahltKandidat()!.brutto) }}</strong>
    </p>
    <div class="form-field">
      <label for="src-app-features-rechnungen-components-zahlungs-tracker-zahlungs-tracker-component-0">Zahlungsdatum</label>
      <input id="src-app-features-rechnungen-components-zahlungs-tracker-zahlungs-tracker-component-0" type="date" [value]="bezahltDatum()" (input)="onDatumChange($event)" />
    </div>
    <div class="modal-footer">
      <button class="btn btn-success" (click)="alsGezahltBestaetigen.emit()">
        ✓ Als bezahlt markieren
      </button>
      <button class="btn" (click)="alsGezahltAbbrechen.emit()">Abbrechen</button>
    </div>
  </app-modal>
}
