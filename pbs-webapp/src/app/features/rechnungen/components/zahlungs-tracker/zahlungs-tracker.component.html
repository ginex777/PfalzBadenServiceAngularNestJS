@if (paidCandidate()) {
  <app-modal
    [isOpen]="!!paidCandidate()"
    title="Rechnung als bezahlt markieren"
    size="sm"
    (closed)="cancelPaid.emit()"
  >
    <p>
      Rechnung <strong>{{ paidCandidate()!.nr }}</strong> — {{ paidCandidate()!.empf }}
    </p>
    <p>
      Betrag: <strong>{{ waehrungFormatieren(paidCandidate()!.brutto) }}</strong>
    </p>
    <div class="form-field">
      <label for="src-app-features-rechnungen-components-zahlungs-tracker-zahlungs-tracker-component-0">Zahlungsdatum</label>
      <input id="src-app-features-rechnungen-components-zahlungs-tracker-zahlungs-tracker-component-0" type="date" [value]="paidDate()" (input)="onDatumChange($event)" />
    </div>
    <div class="modal-footer">
      <button class="btn btn-success" (click)="confirmPaid.emit()">
        ✓ Als bezahlt markieren
      </button>
      <button class="btn" (click)="cancelPaid.emit()">Abbrechen</button>
    </div>
  </app-modal>
}
