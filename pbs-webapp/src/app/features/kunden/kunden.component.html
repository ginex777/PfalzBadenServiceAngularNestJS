<div class="kunden-page">
  <!-- Header -->
  <div class="page-header">
    <app-page-title title="Kunden" [subtitle]="facade.kunden().length + ' Kunden'" />
  </div>

  <!-- Kundenliste -->
  <div class="kunden-liste-card">
    <div class="liste-header">
      <h3 class="section-title">Kundenliste</h3>
      <app-search-toolbar
        placeholder="Kunden suchen…"
        actionLabel="Neuer Kunde"
        [actionRoles]="['admin']"
        [(searchTerm)]="facade.suchbegriff"
        (action)="facade.bearbeitungStarten(null)"
      />
    </div>

    <app-kunden-tabelle
      [customers]="facade.seitenKunden()"
      [revenues]="facade.umsaetze()"
      [loading]="facade.laedt()"
      [searchTerm]="facade.suchbegriff()"
      (editRequested)="bearbeitungStarten($event)"
      (deleteRequested)="loeschenBestaetigen($event)"
      (createInvoiceRequested)="zuRechnungNavigieren($event)"
      (createQuoteRequested)="zuAngebotNavigieren($event)"
      (openItemsRequested)="offenePostenAnzeigen($event)"
      (createRequested)="facade.bearbeitungStarten(null)"
    />

    @if (facade.gesamtSeiten() > 1) {
      <app-paginierung
        [page]="facade.aktuelleSeite()"
        [pageSize]="facade.PAGE_SIZE"
        [total]="facade.gefilterteKunden().length"
        [showPageSize]="false"
        (pageChange)="facade.seiteSetzen($event)"
      />
    }
  </div>

  <!-- Löschen-Bestätigung -->
  @if (facade.loeschKandidat() !== null) {
    <app-confirm-modal
      title="Kunde löschen"
      message="Diesen Kunden wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden."
      confirmLabel="Löschen"
      cancelLabel="Abbrechen"
      [isDangerous]="true"
      (confirmed)="loeschenAusfuehren()"
      (canceled)="loeschenAbbrechen()"
    />
  }

  <!-- Offene Posten Modal -->
  @if (facade.offenePostenSichtbar() && facade.offenePosten()) {
    <app-offene-posten-modal
      [data]="facade.offenePosten()!"
      (closed)="facade.offenePostenSchliessen()"
      (newInvoice)="offenePostenRechnungNavigieren($event)"
      (bulkReminder)="facade.sammelMahnungOeffnen($event)"
    />
  }

  <!-- Sammel-Mahnung Modal -->
  @if (facade.sammelMahnungSichtbar()) {
    <app-modal
      [isOpen]="facade.sammelMahnungSichtbar()"
      title="Sammel-Mahnung"
      size="md"
      (closed)="facade.sammelMahnungSchliessen()"
    >
      <textarea
        class="form-input mahnung-textarea"
        rows="12"
        [value]="facade.sammelMahnungText()"
        readonly
      ></textarea>
      <div class="modal-footer">
        @if (facade.sammelMahnungEmail()) {
          <a
            class="btn btn-danger link-btn"
            [href]="
              'https://outlook.office365.com/mail/deeplink/compose?to=' +
              facade.sammelMahnungEmail() +
              '&subject=' +
              facade.sammelMahnungBetreff() +
              '&body=' +
              facade.sammelMahnungText()
            "
            target="_blank"
            >Outlook öffnen</a
          >
        }
        <button class="btn" (click)="mahnungKopieren()">Kopieren</button>
        <button class="btn" (click)="facade.sammelMahnungSchliessen()">Schließen</button>
      </div>
    </app-modal>
  }

  <!-- Kunde erstellen / bearbeiten Drawer -->
  @if (facade.formularSichtbar()) {
    <app-drawer
      [isOpen]="facade.formularSichtbar()"
      ariaLabel="Kunde Formular"
      [title]="facade.bearbeiteterKunde() ? 'Kunde bearbeiten' : 'Neuer Kunde'"
      position="right"
      (closed)="bearbeitungAbbrechen()"
    >
      <app-kunden-formular
        *roleAllowed="['admin']"
        [editingCustomer]="facade.bearbeiteterKunde()"
        (saved)="speichern($event)"
        (cancelled)="bearbeitungAbbrechen()"
        (changed)="facade.formGeaendert.set(true)"
      />
      <div class="modal-footer">
        <button class="btn" (click)="bearbeitungAbbrechen()">Abbrechen</button>
      </div>
    </app-drawer>
  }
</div>
