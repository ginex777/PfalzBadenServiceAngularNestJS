<div class="page-wrap">
  <app-page-title title="Angebote" subtitle="Erstellen & Verwalten" />

  <div class="card">
    <app-search-toolbar
      placeholder="Angebot suchen…"
      actionLabel="Neues Angebot"
      [actionRoles]="['admin']"
      [(searchTerm)]="facade.suchbegriff"
      (action)="onNeuesAngebot()"
    />

    <app-angebote-tabelle
      [quotes]="facade.seitenAngebote()"
      [loading]="facade.laedt()"
      [activeFilter]="facade.aktiverFilter()"
      (editRequested)="onBearbeiten($event)"
      (deleteRequested)="onLoeschen($event)"
      (setStatus)="onStatusSetzen($event)"
      (generatePdf)="onPdfGenerieren($event)"
      (convertToInvoice)="onZuRechnungKonvertieren($event)"
      (filterChange)="onFilterAendern($event)"
      (copyRequested)="onKopieren($event)"
    />

    @if (facade.gesamtSeiten() > 1) {
      <app-paginierung
        [page]="facade.aktuelleSeite()"
        [pageSize]="facade.PAGE_SIZE"
        [total]="facade.gefilterteAngebote().length"
        [showPageSize]="false"
        (pageChange)="facade.seiteSetzen($event)"
      />
    }
  </div>

  @if (facade.loeschKandidat() !== null) {
    <app-confirm-modal
      title="Angebot löschen"
      message="Dieses Angebot wird unwiderruflich gelöscht."
      confirmLabel="Löschen"
      (confirmed)="facade.loeschenAusfuehren()"
      (canceled)="facade.loeschenAbbrechen()"
    />
  }

  <!-- Modal: Angebot erstellen / bearbeiten / versenden -->
  <app-modal
    [isOpen]="facade.drawerOffen()"
    [title]="facade.drawerSchritt() === 'senden' ? 'Angebot versenden' : facade.bearbeitetesAngebot() ? 'Angebot bearbeiten' : 'Neues Angebot'"
    size="lg"
    (closed)="facade.drawerSchliessen()"
  >
    <div class="drawer-content">
      @if (facade.drawerSchritt() === 'formular') {
        <app-angebote-formular
          [formData]="facade.formularDaten()"
          [customers]="facade.kunden()"
          [editedQuote]="facade.bearbeitetesAngebot()"
          [saving]="facade.speichert()"
          [netTotal]="facade.netto()"
          [grossTotal]="facade.brutto()"
          [vatAmount]="facade.mwstBetrag()"
          (saveRequested)="onSpeichern()"
          (preview)="onVorschau()"
          (cancelRequested)="facade.drawerSchliessen()"
          (addLineItem)="onPositionHinzufuegen()"
          (removeLineItem)="onPositionEntfernen($event)"
          (copyLineItem)="onPositionKopieren($event)"
          (updateLineItem)="onPositionAktualisieren($event)"
          (updateField)="onFeldAktualisieren({ feld: $event.field, wert: $event.value })"
          (selectCustomer)="onKundeAuswaehlen($event)"
          (saveAsCustomer)="onAlsKundeSpeichern()"
        />
      }

      @if (facade.drawerSchritt() === 'senden') {
        <div class="send-step">
          <div class="send-info">
            <div><strong>An:</strong> {{ facade.sendModal()!.email }}</div>
            <div><strong>Betreff:</strong> {{ sendBetreff() }}</div>
          </div>
          <label for="src-app-features-angebote-angebote-component-0" class="send-label">E-Mail Text:</label>
          <textarea
            class="form-input send-textarea"
            rows="9"
            [value]="sendText()"
            readonly
          ></textarea>
          <div class="send-actions">
            <button class="btn btn-primary" (click)="outlookOeffnen()">Outlook öffnen</button>
            <button class="btn" (click)="textKopieren()">Kopieren</button>
            <button class="btn" (click)="facade.sendModalSchliessen()">Schließen</button>
          </div>
        </div>
      }
    </div>
  </app-modal>
</div>
