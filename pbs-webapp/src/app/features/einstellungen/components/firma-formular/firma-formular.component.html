<div class="card">
  <h3 class="section-title">Firmen-Stammdaten</h3>
  <p class="hint hint--mb">
    Diese Daten erscheinen auf allen Rechnungen und Angeboten als Absender und im Footer.
  </p>

  <div class="form-row">
    <div class="form-field">
      <label for="src-app-features-einstellungen-components-firma-formular-firma-formular-component-0">Firmenname</label>
      <input
        type="text"
        [value]="company().firma || ''"
        (input)="feldGeaendert('firma', $event)"
        placeholder="Pfalz-Baden Service"
      />
    </div>
    <div class="form-field">
      <label for="src-app-features-einstellungen-components-firma-formular-firma-formular-component-1">Rechtsform / Zusatz</label>
      <input
        type="text"
        [value]="company().zusatz || ''"
        (input)="feldGeaendert('zusatz', $event)"
        placeholder="Hassan Maatouk und Dennis Schuhmacher GbR"
      />
    </div>
  </div>
  <div class="form-row">
    <div class="form-field">
      <label for="src-app-features-einstellungen-components-firma-formular-firma-formular-component-2">Straße</label>
      <input
        type="text"
        [value]="company().strasse || ''"
        (input)="feldGeaendert('strasse', $event)"
        placeholder="Petronia-Steiner-Straße 3"
      />
    </div>
    <div class="form-field">
      <label for="src-app-features-einstellungen-components-firma-formular-firma-formular-component-3">PLZ Ort</label>
      <input
        type="text"
        [value]="company().ort || ''"
        (input)="feldGeaendert('ort', $event)"
        placeholder="67346 Speyer"
      />
    </div>
  </div>
  <div class="form-row">
    <div class="form-field">
      <label for="src-app-features-einstellungen-components-firma-formular-firma-formular-component-4">Steuernummer</label>
      <input
        type="text"
        [value]="company().steuernr || ''"
        (input)="feldGeaendert('steuernr', $event)"
        placeholder="41/108/84558"
      />
    </div>
    <div class="form-field">
      <label for="src-app-features-einstellungen-components-firma-formular-firma-formular-component-5">USt-IdNr. (optional)</label>
      <input
        type="text"
        [value]="company().ustId || ''"
        (input)="feldGeaendert('ustId', $event)"
        placeholder="DE123456789"
      />
    </div>
  </div>
  <div class="form-row">
    <div class="form-field">
      <label for="src-app-features-einstellungen-components-firma-formular-firma-formular-component-6">Geschäftsführer</label>
      <input
        type="text"
        [value]="company().gf || ''"
        (input)="feldGeaendert('gf', $event)"
        placeholder="Hassan Maatouk"
      />
    </div>
    <div class="form-field">
      <label for="src-app-features-einstellungen-components-firma-formular-firma-formular-component-7">Telefon</label>
      <input
        type="text"
        [value]="company().tel || ''"
        (input)="feldGeaendert('tel', $event)"
        placeholder="0179 6150849"
      />
    </div>
    <div class="form-field">
      <label for="src-app-features-einstellungen-components-firma-formular-firma-formular-component-8">E-Mail</label>
      <input
        type="text"
        [value]="company().email || ''"
        (input)="feldGeaendert('email', $event)"
        placeholder="kontakt@pfalzbaden-service.de"
      />
    </div>
  </div>
  <div class="form-row">
    <div class="form-field">
      <label for="src-app-features-einstellungen-components-firma-formular-firma-formular-component-9">Bank</label>
      <input
        type="text"
        [value]="company().bank || ''"
        (input)="feldGeaendert('bank', $event)"
        placeholder="Sparkasse Vorderpfalz"
      />
    </div>
    <div class="form-field">
      <label for="src-app-features-einstellungen-components-firma-formular-firma-formular-component-10">IBAN</label>
      <input
        type="text"
        [value]="company().iban || ''"
        (input)="feldGeaendert('iban', $event)"
        placeholder="DE55 5455 0010 0194 3758 61"
      />
    </div>
    <div class="form-field">
      <label for="src-app-features-einstellungen-components-firma-formular-firma-formular-component-11">BIC</label>
      <input
        type="text"
        [value]="company().bic || ''"
        (input)="feldGeaendert('bic', $event)"
        placeholder="LUHSDE6XXX"
      />
    </div>
  </div>
  <div class="form-row">
    <div class="form-field">
      <label for="src-app-features-einstellungen-components-firma-formular-firma-formular-component-12">DATEV Beraternummer</label>
      <input
        type="text"
        [value]="company().datev_beraternr || ''"
        (input)="feldGeaendert('datev_beraternr', $event)"
        placeholder="99999"
      />
    </div>
    <div class="form-field">
      <label for="src-app-features-einstellungen-components-firma-formular-firma-formular-component-13">DATEV Mandantennummer</label>
      <input
        type="text"
        [value]="company().datev_mandantennr || ''"
        (input)="feldGeaendert('datev_mandantennr', $event)"
        placeholder="1"
      />
    </div>
  </div>

  <div class="btn-group btn-group-mt">
    <button class="btn btn-primary" [disabled]="saving()" (click)="save.emit()">
      {{ saving() ? 'Wird gesaving…' : 'save' }}
    </button>
  </div>

  @if (success()) {
    <div class="status-ok">{{ success() }}</div>
  }
  @if (error()) {
    <div class="status-err">{{ error() }}</div>
  }
</div>
