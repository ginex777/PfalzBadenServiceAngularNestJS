<div class="page-wrap">
  <div class="page-header">
    <app-page-title title="Zeiterfassung" subtitle="Alle Einträge mit Objekt & Kunde" />
    <button class="btn btn-secondary" [disabled]="!eintraege().length" (click)="csvExportieren()">
      CSV exportieren
    </button>
  </div>

  <app-zeiterfassung-filter
    [filters]="filters()"
    [employees]="mitarbeiter()"
    [objects]="objekte()"
    [customers]="kunden()"
    (filtersChange)="onFiltersChange($event)"
    (reset)="onResetFilters()"
  />

  <app-zeiterfassung-liste
    [eintraege]="eintraege()"
    [total]="total()"
    [page]="page()"
    [pageSize]="pageSize()"
    [isLoading]="isLoading()"
    [totalDurationMinutes]="totalDurationMinutes()"
    [errorMessage]="errorMessage()"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
  />
</div>
