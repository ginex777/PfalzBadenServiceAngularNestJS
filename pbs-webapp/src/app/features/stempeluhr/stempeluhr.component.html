<div class="page-wrap">
  <app-page-title title="Zeiterfassung" subtitle="Alle Einträge mit Objekt & Kunde" />

  <app-zeiterfassung-filter
    [filters]="filters()"
    [mitarbeiter]="mitarbeiter()"
    [objekte]="objekte()"
    [kunden]="kunden()"
    (filtersChange)="onFiltersChange($event)"
    (reset)="onResetFilters()"
  />

  <app-zeiterfassung-liste
    [eintraege]="eintraege()"
    [total]="total()"
    [page]="page()"
    [pageSize]="pageSize()"
    [isLoading]="isLoading()"
    [totalDurationMinutes]="totalDurationMinutes()"
    [errorMessage]="errorMessage()"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
  />
</div>
