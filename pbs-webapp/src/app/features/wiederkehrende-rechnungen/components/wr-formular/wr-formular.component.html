<div class="formular-content">
  <div class="form-row">
    <div class="form-field">
      <label for="src-app-features-wiederkehrende-rechnungen-components-wr-formular-wr-formular-component-0" class="form-label">Titel *</label>
      <input
        class="form-input"
        type="text"
        placeholder="z.B. Monatliche Reinigung"
        [formField]="wrForm.titel"
      />
      @if (wrForm.titel().touched() && wrForm.titel().invalid()) {
        <span class="form-fehler">{{ wrForm.titel().errors()[0]?.message }}</span>
      }
    </div>
    <div class="form-field">
      <label for="src-app-features-wiederkehrende-rechnungen-components-wr-formular-wr-formular-component-1" class="form-label">Kunde</label>
      <select
        class="form-select"
        [value]="formModell().kunden_id ?? ''"
        (change)="kundenIdGeaendert($event)"
      >
        <option value="">-- kein Kunde --</option>
        @for (k of kunden(); track k.id) {
          <option [value]="k.id">{{ k.name }}</option>
        }
      </select>
    </div>
    <div class="form-field">
      <label for="src-app-features-wiederkehrende-rechnungen-components-wr-formular-wr-formular-component-2" class="form-label">Intervall</label>
      <select
        class="form-select"
        [value]="formModell().intervall"
        (change)="intervallGeaendert($event)"
      >
        @for (opt of intervallOptionen; track opt.wert) {
          <option [value]="opt.wert">{{ opt.label }}</option>
        }
      </select>
    </div>
    <div class="form-field form-field--checkbox">
      <label for="src-app-features-wiederkehrende-rechnungen-components-wr-formular-wr-formular-component-3" class="form-label">Aktiv</label>
      <input
        type="checkbox"
        [checked]="formModell().aktiv"
        (change)="aktivGeaendert($event)"
      />
    </div>
  </div>

  <div class="positionen-bereich">
    <div class="positionen-kopf">
      <label for="src-app-features-wiederkehrende-rechnungen-components-wr-formular-wr-formular-component-4" class="form-label">Positionen</label>
      <button class="btn btn-sm" (click)="positionHinzufuegen()">Position</button>
    </div>
    @for (pos of formModell().positionen; track $index) {
      <div class="position-zeile">
        <textarea
          class="form-input"
          rows="1"
          placeholder="Beschreibung"
          [value]="pos.bez"
          (input)="positionBezGeaendert($index, $event)"
        ></textarea>
        <input
          class="form-input pos-preis"
          type="number"
          step="0.01"
          min="0"
          placeholder="Betrag"
          [value]="pos.gesamtpreis || ''"
          (input)="positionGesamtpreisGeaendert($index, $event)"
        />
        @if (formModell().positionen.length > 1) {
          <button class="btn-action btn-action--danger" (click)="positionEntfernen($index)">✕</button>
        }
      </div>
    }
    <div class="positionen-summe">Gesamt: {{ fmt(brutto()) }}</div>
  </div>

  <div class="form-aktionen">
    <button class="btn btn-primary" [disabled]="!istGueltig()" (click)="speichern()">
      Speichern
    </button>
  </div>
</div>
