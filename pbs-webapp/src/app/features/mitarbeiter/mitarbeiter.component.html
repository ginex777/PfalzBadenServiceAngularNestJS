<div class="page-wrap">
  <app-page-title title="Mitarbeiter" subtitle="Mitarbeiterverwaltung und Stundenerfassung" />

  @if (!facade.aktiverMitarbeiter()) {
    <div class="toolbar">
      <span class="toolbar__info">{{ facade.mitarbeiter().length }} Mitarbeiter</span>
      <button class="btn btn-primary" (click)="facade.formularOeffnen()">Neuer Mitarbeiter</button>
    </div>

    <app-mitarbeiter-liste
      [employees]="facade.mitarbeiter()"
      [loading]="facade.laedt()"
      (edit)="facade.formularOeffnen($event)"
      (delete)="facade.loeschenBestaetigen($event)"
      (openHours)="facade.stundenOeffnen($event)"
      (toggleActive)="facade.aktivToggle($event.id, $event.active)"
    />
  } @else {
    <app-stunden-erfassung
      [employee]="facade.aktiverMitarbeiter()!"
      [hours]="facade.stunden()"
      [hoursLoading]="facade.stundenLaedt()"
      [timeClockEntries]="facade.stempelEintraege()"
      [timeClockLoading]="facade.stempelLaedt()"
      [formData]="facade.stundenFormular()"
      [payrollPreview]="facade.lohnVorschau()"
      [statistik]="facade.statistik()"
      (back)="facade.stundenSchliessen()"
      (add)="facade.stundenEintragen()"
      (togglePaid)="facade.bezahltToggle($event.id, $event.paid)"
      (delete)="facade.stundenLoeschenBestaetigen($event)"
      (fieldChanged)="stundenFeldGeaendert($event)"
      (generatePdf)="facade.abrechnungPdfGenerieren()"
      (convertTimeClockEntry)="stempelZuStundenKonvertieren($event)"
    />
  }

  @if (facade.loeschKandidat() !== null) {
    <app-confirm-modal
      message="Mitarbeiter wirklich löschen? Alle Stundendaten werden ebenfalls gelöscht."
      (confirmed)="facade.loeschenAusfuehren()"
      (canceled)="facade.loeschenAbbrechen()"
    />
  }

  @if (facade.loeschStundenKandidat() !== null) {
    <app-confirm-modal
      message="Stundeneintrag wirklich löschen?"
      (confirmed)="facade.stundenLoeschenAusfuehren()"
      (canceled)="facade.stundenLoeschenAbbrechen()"
    />
  }

  <!-- Mitarbeiter erstellen / edit Drawer -->
  @if (facade.formularSichtbar()) {
    <app-drawer
      [isOpen]="facade.formularSichtbar()"
      ariaLabel="Mitarbeiter Formular"
      [title]="facade.bearbeiteterMitarbeiter() ? 'Mitarbeiter bearbeiten' : 'Neuer Mitarbeiter'"
      position="right"
      (closed)="facade.formularSchliessen()"
    >
      <app-mitarbeiter-formular
        [editedEmployee]="facade.bearbeiteterMitarbeiter()"
        (saved)="speichern($event)"
        (cancelled)="facade.formularSchliessen()"
      />
    </app-drawer>
  }
</div>
