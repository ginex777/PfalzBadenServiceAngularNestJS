<div class="app-error">
  <div class="app-error__icon" aria-hidden="true">!</div>
  <div class="app-error__content">
    <div class="app-error__title">{{ title() }}</div>
    <div class="app-error__message">{{ message() }}</div>
    @if (actionLabel()) {
      <app-button variant="primary" size="sm" (click)="action.emit()">{{
        actionLabel()
      }}</app-button>
    }
  </div>
</div>
