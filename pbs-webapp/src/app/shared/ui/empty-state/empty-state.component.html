<div class="empty-state" role="status">
  <div class="empty-state__icon" aria-hidden="true">
    <svg
      width="40"
      height="40"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.5"
    >
      <circle cx="12" cy="12" r="10" />
      <line x1="12" y1="8" x2="12" y2="12" />
      <line x1="12" y1="16" x2="12.01" y2="16" />
    </svg>
  </div>
  <p class="empty-state__titel">{{ titel() }}</p>
  @if (beschreibung()) {
    <p class="empty-state__beschreibung">{{ beschreibung() }}</p>
  }
  @if (aktionLabel()) {
    <button class="btn btn-primary" (click)="aktionAusfuehren()">
      {{ aktionLabel() }}
    </button>
  }
</div>
