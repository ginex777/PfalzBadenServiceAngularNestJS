<div class="search-toolbar">
  <div class="search-toolbar__suche">
    <svg class="search-toolbar__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input
      class="search-toolbar__input"
      type="search"
      [placeholder]="platzhalter()"
      [value]="suchbegriff()"
      (input)="eingabeGeaendert($event)"
      aria-label="Suche"
    />
  </div>
  @if (aktionLabel()) {
    <button
      class="btn btn--primary"
      (click)="aktionAusfuehren()"
      [disabled]="aktionDeaktiviert()"
    >
      {{ aktionLabel() }}
    </button>
  }
</div>
