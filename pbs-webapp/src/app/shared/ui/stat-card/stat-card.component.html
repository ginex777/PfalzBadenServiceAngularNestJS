<div class="stat-card stat-card--{{ variant() }}" [class.stat-card--laedt]="isLoading()">
  <div class="stat-card__titel">{{ title() }}</div>
  @if (isLoading()) {
    <div class="stat-card__skeleton"></div>
  } @else {
    <div class="stat-card__wert">{{ value() }}</div>
  }
  @if (subtitle()) {
    <div class="stat-card__untertitel">{{ subtitle() }}</div>
  }
</div>
