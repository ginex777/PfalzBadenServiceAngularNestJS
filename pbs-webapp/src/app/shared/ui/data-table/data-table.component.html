<div class="data-table-wrapper">
  @if (isLoading()) {
    <div class="data-table__ladeindikator" role="status" aria-label="Daten werden geladen">
      @for (i of [1, 2, 3, 4, 5]; track i) {
        <div class="data-table__skeleton-zeile"></div>
      }
    </div>
  } @else {
    <table class="table data-table">
      <thead>
        <tr>
          @for (column of columns(); track column.key) {
            <th
              [style.width]="column.width ?? 'auto'"
              [class.data-table__th--rechts]="column.align === 'right'"
              [class.data-table__th--mitte]="column.align === 'center'"
              scope="col"
            >
              {{ column.label }}
            </th>
          }
        </tr>
      </thead>
      <tbody>
        @for (row of rows(); track $index) {
          <tr
            class="data-table__zeile"
            tabindex="0"
            (click)="handleRowClick(row)"
            (keydown)="onRowKeydown($event, row)"
          >
            @for (column of columns(); track column.key) {
              <td
                [class.data-table__td--rechts]="column.align === 'right'"
                [class.data-table__td--mitte]="column.align === 'center'"
              >
                {{ readCellValue(row, column.key) }}
              </td>
            }
          </tr>
        }
      </tbody>
    </table>
  }
</div>
