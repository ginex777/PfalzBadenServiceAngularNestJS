<div class="paginierung">
  <div class="paginierung__info">
    <span class="paginierung__range">{{ fromToLabel() }}</span>
  </div>

  <div class="paginierung__controls">
    <label class="paginierung__label">
      <span class="paginierung__label-text">Pro Seite</span>
      <select class="paginierung__select" [value]="pageSize()" (change)="onPageSizeChange($event)">
        @for (opt of pageSizeOptions(); track opt) {
          <option [value]="opt">{{ opt }}</option>
        }
      </select>
    </label>

    <button class="btn btn-sm" [disabled]="page() <= 1" (click)="prev()">← Zurück</button>
    <span class="paginierung__page">Seite {{ page() }} / {{ totalPages() }}</span>
    <button class="btn btn-sm" [disabled]="page() >= totalPages()" (click)="next()">
      Weiter →
    </button>
  </div>
</div>
