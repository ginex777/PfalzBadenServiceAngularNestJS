@if (isOpen()) {
  <div class="app-modal__overlay" (click)="close()" aria-hidden="true"></div>
  <div class="app-modal app-modal--{{ size() }}" role="dialog" aria-modal="true">
    @if (title()) {
      <div class="app-modal__header">
        <h2 class="app-modal__title">{{ title() }}</h2>
        <button class="app-modal__close" type="button" (click)="close()" aria-label="Schließen">
          ×
        </button>
      </div>
    }
    <div class="app-modal__body">
      <ng-content />
    </div>
  </div>
}
