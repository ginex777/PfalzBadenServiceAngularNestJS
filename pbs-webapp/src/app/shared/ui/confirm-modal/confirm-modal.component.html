<div class="modal-backdrop" (click)="cancel()" aria-hidden="true"></div>

<div class="modal" role="dialog" aria-labelledby="confirm-modal-title" aria-modal="true">
  <div class="modal__header">
    <h2 class="modal__titel" id="confirm-modal-title">{{ title() }}</h2>
  </div>
  <div class="modal__body">
    <p class="modal__nachricht">{{ message() }}</p>
  </div>
  <div class="modal__footer">
    <button class="btn btn-ghost" (click)="cancel()">
      {{ cancelLabel() }}
    </button>
    <button
      class="btn"
      [class.btn-danger]="isDangerous()"
      [class.btn-primary]="!isDangerous()"
      (click)="confirm()"
    >
      {{ confirmLabel() }}
    </button>
  </div>
</div>
