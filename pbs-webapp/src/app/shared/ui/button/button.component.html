<button
  [class]="cssClass()"
  [disabled]="isDisabled()"
  [attr.type]="type()"
  [attr.aria-label]="ariaLabel()"
>
  @if (loading()) {
    <span class="app-btn__spinner" aria-hidden="true"></span>
    <span class="app-btn__label"><ng-content /></span>
  } @else {
    <ng-content />
  }
</button>
