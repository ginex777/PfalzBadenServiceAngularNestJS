<ion-item class="object-select" lines="none" [disabled]="disabled() || isEmpty()">
  <ion-label position="stacked">{{ label() }}</ion-label>
  <ion-select
    [value]="selectedObjectId()"
    interface="popover"
    [placeholder]="placeholder()"
    (ionChange)="onChanged($event)"
  >
    @for (obj of objects(); track obj.id) {
      <ion-select-option [value]="obj.id">{{ obj.name }}</ion-select-option>
    }
  </ion-select>
</ion-item>
