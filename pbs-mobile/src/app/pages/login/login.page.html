<ion-content [fullscreen]="true">
  <div class="app-page-grid page-login">
    <div class="login-panel app-card">
      <div class="login-intro">
        <p class="login-badge">PBS Mobile</p>
        <h1 class="login-title">Willkommen</h1>
        <p class="login-subtitle">Melde dich an, um deinen Arbeitstag zu starten.</p>
      </div>

      <form class="login-form" [formGroup]="form" (ngSubmit)="login()">
        <div class="input-block">
          <label class="field-label" for="email">E-Mail</label>
          <input
            id="email"
            class="form-input"
            type="email"
            formControlName="email"
            autocomplete="username"
            placeholder="name@firma.de"
          />
          @if (showFieldError('email')) {
            <p class="field-error">Bitte eine gueltige E-Mail eingeben.</p>
          }
        </div>

        <div class="input-block">
          <label class="field-label" for="password">Passwort</label>
          <input
            id="password"
            class="form-input"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            placeholder="Dein Passwort"
          />
          @if (showFieldError('password')) {
            <p class="field-error">Passwort ist erforderlich.</p>
          }
        </div>

        <button type="submit" class="submit-button" [disabled]="isLoading()">
          {{ isLoading() ? 'Bitte warten...' : 'Anmelden' }}
        </button>
      </form>
    </div>
  </div>
</ion-content>

<ion-toast
  [isOpen]="toastOpen()"
  [message]="toastMessage()"
  color="danger"
  duration="5000"
  position="top"
  (didDismiss)="closeToast()"
></ion-toast>
