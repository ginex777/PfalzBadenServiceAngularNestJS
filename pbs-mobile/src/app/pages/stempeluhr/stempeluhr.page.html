<ion-header>
  <ion-toolbar>
    <ion-title>Stempeluhr</ion-title>
    <ion-button slot="end" fill="clear" (click)="logout()">Abmelden</ion-button>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="page-stempeluhr">
    @if (user()) {
      <p class="welcome">Hallo, {{ user()!.email }}</p>
    }

    <ion-card class="uhr-card" [class.aktiv]="isActive">
      <ion-card-content>
        <div class="uhr-status">{{ isActive ? 'Aktiv' : 'Nicht gestempelt' }}</div>
        <div class="laufzeit">{{ runtime() }}</div>

        @if (isActive) {
          <ion-button expand="block" color="danger" [disabled]="isLoading()" (click)="stop()">
            Stoppen
          </ion-button>
        } @else {
          <ion-button expand="block" color="success" [disabled]="isLoading()" (click)="start()">
            Stempeln
          </ion-button>
        }
      </ion-card-content>
    </ion-card>

    @if (message()) {
      <p class="meldung">{{ message() }}</p>
    }
  </div>
</ion-content>
