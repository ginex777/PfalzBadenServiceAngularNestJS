<ion-header>
  <ion-toolbar>
    <ion-title>Foto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="page-foto">
    @if (!preview()) {
      <div class="btn-group">
        <ion-button expand="block" (click)="takePhoto()">Foto aufnehmen</ion-button>
        <ion-button expand="block" fill="outline" (click)="pickFromGallery()">
          Aus Galerie waehlen
        </ion-button>
      </div>
    } @else {
      <ion-card>
        <ion-card-content>
          <img [src]="preview()!" class="preview-img" alt="Vorschau" />
          <div class="preview-actions">
            <ion-button expand="block" color="success" [disabled]="isLoading()" (click)="upload()">
              {{ isLoading() ? 'Hochladen...' : 'Hochladen' }}
            </ion-button>
            <ion-button expand="block" fill="outline" color="danger" (click)="discard()">
              Verwerfen
            </ion-button>
          </div>
        </ion-card-content>
      </ion-card>
    }

    @if (successMessage()) {
      <p class="success-banner">{{ successMessage() }}</p>
    }
    @if (errorMessage()) {
      <p class="fehler-banner">{{ errorMessage() }}</p>
    }
  </div>
</ion-content>
