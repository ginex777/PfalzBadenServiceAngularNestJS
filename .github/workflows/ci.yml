name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Mojibake scan
        run: npm run check:mojibake

      - name: Unsafe cast scan
        run: npm run check:unsafe-casts

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pbs
          POSTGRES_USER: pbs
          POSTGRES_PASSWORD: pbs_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pbs -d pbs"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://pbs:pbs_secret@localhost:5432/pbs
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            pbs-backend/package-lock.json

      - name: Install
        run: npm ci --prefix pbs-backend

      - name: Typecheck
        run: npx tsc --noEmit -p pbs-backend/tsconfig.json

      - name: Lint check
        run: npm run lint:check --prefix pbs-backend

      - name: Build
        run: npm run build --prefix pbs-backend

      - name: Database migrations
        run: npm run prisma:migrate:deploy --prefix pbs-backend

      - name: Unit tests with service coverage gate
        run: npm run test:coverage:services --prefix pbs-backend

      - name: E2E tests
        run: npm run test:e2e --prefix pbs-backend

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: pbs-backend/coverage
          if-no-files-found: ignore

  webapp:
    name: Webapp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            pbs-webapp/package-lock.json

      - name: Install
        run: npm ci --prefix pbs-webapp

      - name: Typecheck
        run: npx tsc --noEmit -p pbs-webapp/tsconfig.json

      - name: Build
        run: npm run build --prefix pbs-webapp

      - name: Lint check
        run: npm run lint:check --prefix pbs-webapp

      - name: Tests
        run: npm test --prefix pbs-webapp

      - name: Coverage
        run: npm run test:coverage:webapp

      - name: Upload webapp coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: webapp-coverage
          path: pbs-webapp/coverage
          if-no-files-found: ignore

      - name: Upload Sentry sourcemaps (prod)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_WEBAPP }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: |
          npm run build:prod --prefix pbs-webapp
          npm run sentry:sourcemaps --prefix pbs-webapp

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            pbs-mobile/package-lock.json

      - name: Install
        run: npm ci --prefix pbs-mobile

      - name: Typecheck
        run: npx tsc --noEmit -p pbs-mobile/tsconfig.json

      - name: Build
        run: npm run build --prefix pbs-mobile

      - name: Lint check
        run: npm run lint:check --prefix pbs-mobile

      - name: Coverage
        run: npm run test:coverage --prefix pbs-mobile

      - name: Upload mobile coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-coverage
          path: pbs-mobile/coverage
          if-no-files-found: ignore

      - name: Upload Sentry sourcemaps (prod)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_MOBILE }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: |
          npm run build:prod --prefix pbs-mobile
          npm run sentry:sourcemaps --prefix pbs-mobile

  docker:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build images (cached)
        uses: docker/bake-action@v6
        with:
          files: docker-compose.yml
          targets: backend,frontend,mobile
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
