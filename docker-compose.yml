services:
  postgres:
    image: postgres:16-alpine
    container_name: pbs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pbs
      POSTGRES_USER: pbs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pbs_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pbs -d pbs"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./pbs-backend
      dockerfile: Dockerfile
    container_name: pbs-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://pbs:${POSTGRES_PASSWORD:-pbs_secret}@postgres:5432/pbs
      BACKUP_DIR: /data/backups
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
    volumes:
      - ./data:/data
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./pbs-webapp
      dockerfile: Dockerfile
    container_name: pbs-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
